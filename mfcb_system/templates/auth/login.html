
{% extends 'base.html' %}
{% block title %}{{ pretty }} | MFCB{% endblock %}
{% block content %}
<section class="container">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card soft-card login-card">
        <div class="card-body p-4">
          <span class="badge badge-soft">{{ pretty }}</span>
          <h2 class="mt-3">Secure Sign In</h2>
          <p class="text-muted">Enter your assigned credentials to continue.</p>
          <form method="post" class="row g-3">
            <div class="col-12"><label class="form-label">Username</label><input name="username" class="form-control" required></div>
            <div class="col-12"><label class="form-label">Password</label><input name="password" type="password" class="form-control" required></div>
            <div class="col-12 d-grid"><button class="btn btn-primary">Sign In</button></div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
