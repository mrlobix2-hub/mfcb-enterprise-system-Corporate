
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ config.title }} Report</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{padding:30px;font-family:Arial,sans-serif;color:#1f2937}
h1{font-size:28px;margin-bottom:4px}
.small-muted{color:#6b7280}
.table th,.table td{font-size:13px}
</style>
</head>
<body onload="window.print()">
  <div class="mb-4">
    <h1>MFCB (SMC) Private Limited</h1>
    <div class="small-muted">System-generated professional report</div>
    <h3 class="mt-3">{{ config.title }}</h3>
  </div>
  <table class="table table-bordered">
    <thead>
      <tr>{% for col in config.columns %}<th>{{ col|replace('_', ' ')|title }}</th>{% endfor %}</tr>
    </thead>
    <tbody>
      {% for r in records %}
      <tr>{% for col in config.columns %}<td>{{ attribute(r, col) }}</td>{% endfor %}</tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
